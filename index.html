<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <link id="favicon" rel="icon" type="image/x-icon" href="shop.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db = null;
        let auth = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nevermore-boutique';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.warn("Auth nicht möglich");
                    }
                };
                onAuthStateChanged(auth, (u) => { window.user = u; });
                initAuth();
            }
        } catch (e) { console.warn("Offline-Modus aktiv."); }

        window.saveOrderToCloud = async (orderData) => {
            if (!db || !window.user) return true; 
            try {
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'bess_json');
                await addDoc(ordersRef, { ...orderData, userId: window.user.uid, timestamp: serverTimestamp(), status: 'neu' });
                return true;
            } catch (e) { return false; }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap');

        :root {
            --ghoul-black: #0a0a0a;
            --raven-grey: #1a1a1a;
            --blood-red: #4a0404;
            --ghost-white: #e0e0e0;
        }

        body {
            background-color: var(--ghoul-black);
            color: var(--ghost-white);
            font-family: 'Crimson Text', serif;
            overflow: hidden; 
        }

        .gothic-title { font-family: 'UnifrakturMaguntia', cursive; }

        .product-card {
            background: var(--raven-grey);
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--blood-red);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(74, 4, 4, 0.3);
        }

        .cart-sidebar {
            background: #111;
            border-left: 2px solid var(--blood-red);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gothic {
            background: var(--blood-red);
            color: white;
            transition: all 0.3s;
        }

        .btn-gothic:hover:not(:disabled) { background: #700606; letter-spacing: 2px; }
        
        .btn-gothic:disabled { 
            background: #1a1a1a !important; 
            color: #444 !important; 
            cursor: not-allowed !important; 
            border: 1px solid #333 !important;
            opacity: 0.6;
        }

        .portal-overlay {
            background: rgba(0,0,0,0.99);
            backdrop-filter: blur(20px);
        }

        .lang-card {
            background: #111;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-card:hover {
            border-color: var(--blood-red);
            background: #1a0000;
        }

        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 0.8; } 50% { opacity: 1; text-shadow: 0 0 10px #4a0404; } 100% { opacity: 0.8; } }

        .dark-input { color: white !important; background: #222 !important; border: 1px solid #444 !important; }
    </style>
</head>

            </div>

            },
            fr: {

                btnAccept: "Lire...",
                btnAccepted: "J'accepte",
                btnReject: "Refuser (Partir)",
                cartTitle: "Votre Butin",
                checkoutBtn: "À l'Exécution",
                total: "Total :",
                checkoutTitle: "Derniers Rites",
                nameLabel: "Votre Nom",
                cardLabel: "CARTE",
                payBtn: "Sceller le sort",
                successTitle: "C'est accompli.",
                backBtn: "Retour",
                toastAdd: "Butin sécurisé.",
                emptyCart: "Vide comme une tombe.",
                ppTitle: "Payer avec Payy Pall",
                ppLogin: "Se connecter",
                ppCancel: "Annuler",
                ppVerify: "Entrer le code",
                ppConfirm: "Confirmer",
                placeholderName: "Nom de l'âme",
                placeholderCard: "Numéro de carte"
            }
        };

        let currentLang = 'de';
        const originalTitle = "Nevermore Boutique | Mystery & Darkness";
        const originalIcon = "shop.ico";
        const paypalIcon = "payy.ico";
        let cart = [];
        let method = 'card';
        let ppCode = "";

        const products = [
            { id: 1, name: "Deadly Nightshade", price: 13.99, icon: "leaf", desc: "Ornamental for the afterlife." },
            { id: 2, name: "Thing", price: 66.60, icon: "hand-paper", desc: "Loyal companion." },
            { id: 3, name: "Black Umbrella", price: 24.50, icon: "umbrella", desc: "Keeps the sun away." },
            { id: 4, name: "Raven Typewriter", price: 120.00, icon: "keyboard", desc: "For dark poetry." },
            { id: 5, name: "Cursed Amulet", price: 44.90, icon: "gem", desc: "Attracts bad luck (and looks)." },
            { id: 6, name: "Coffin Sleep Mask", price: 15.00, icon: "eye-slash", desc: "Rest in peace (for 8 hours)." },
            { id: 7, name: "Poison Vial Set", price: 32.00, icon: "flask", desc: "Decorative vials. Do not drink!" },
            { id: 8, name: "Web Lace", price: 8.50, icon: "spider", desc: "Finest weave from the cellar." },
            { id: 9, name: "Ouija Board", price: 55.00, icon: "ghost", desc: "Talk to the ancestors." },
            { id: 10, name: "Widow's Veil", price: 19.99, icon: "user-secret", desc: "Perfect for sad occasions." }
        ];

        function selectLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-portal').classList.add('hidden');
            document.getElementById('agb-overlay').classList.remove('hidden');
            applyTranslations();
            startAGBTimer();
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.getElementById('agb-title').innerText = t.agbTitle;
            document.getElementById('agb-content').innerHTML = t.agbContent;
            document.getElementById('reject-btn').innerText = t.btnReject;
            document.getElementById('cart-title').innerText = t.cartTitle;
            document.getElementById('checkout-btn').innerText = t.checkoutBtn;
            document.getElementById('total-label').innerText = t.total;
            document.getElementById('checkout-title').innerText = t.checkoutTitle;
            document.getElementById('name-label').innerText = t.nameLabel;
            document.getElementById('card-label').innerText = t.cardLabel;
            document.getElementById('pay-button').innerText = t.payBtn;
            document.getElementById('success-title').innerText = t.successTitle;
            document.getElementById('back-btn').innerText = t.backBtn;
            document.getElementById('pp-title').innerText = t.ppTitle;
            document.getElementById('pp-login-btn').innerText = t.ppLogin;
            document.getElementById('pp-cancel-btn').innerText = t.ppCancel;
            document.getElementById('pp-verify-title').innerText = t.ppVerify;
            document.getElementById('pp-confirm-btn').innerText = t.ppConfirm;
            
            document.getElementById('customer-name').placeholder = t.placeholderName;
            document.getElementById('card-input-placeholder').placeholder = t.placeholderCard;
        }

        function startAGBTimer() {
            let timeLeft = 5;
            const btn = document.getElementById('accept-btn');
            const t = translations[currentLang];
            
            btn.disabled = true;
            btn.innerText = `${t.btnAccept} (${timeLeft})`;

            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.innerText = t.btnAccepted;
                    btn.disabled = false;
                } else {
                    btn.innerText = `${t.btnAccept} (${timeLeft})`;
                }
            }, 1000);
        }

        function acceptAGB() {
            if (document.getElementById('accept-btn').disabled) return;
            document.getElementById('agb-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function rejectAGB() {
            window.close();
            document.body.innerHTML = "<div style='background:black;color:red;height:100vh;display:flex;align-items:center;justify-content:center;font-family:serif;font-size:2rem;text-align:center;padding:2rem;'>Access Denied.<br>Leave this place.</div>";
        }

        function changeFavicon(src) {
            let link = document.getElementById('favicon');
            if (link) link.href = src;
        }

        function init() {
            const grid = document.getElementById('product-grid');
            if (grid) {
                grid.innerHTML = products.map(p => `
                    <div class="product-card p-6 rounded-lg flex flex-col items-center text-center">
                        <div class="w-20 h-20 bg-zinc-800 rounded-full flex items-center justify-center mb-4 text-red-800">
                            <i class="fas fa-${p.icon} text-3xl"></i>
                        </div>
                        <h3 class="text-lg font-bold mb-1 text-white">${p.name}</h3>
                        <p class="text-xs text-zinc-500 italic mb-4">${p.desc}</p>
                        <div class="mt-auto pt-4 flex justify-between w-full items-center">
                            <span class="font-bold text-white">${p.price.toFixed(2)} €</span>
                            <button onclick="addToCart(${p.id})" class="p-2 bg-zinc-700 hover:bg-red-900 rounded-full transition-colors text-white">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            updateCart();
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCart();
            showToast(translations[currentLang].toastAdd);
        }

        function updateCart() {
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            if (count) count.innerText = cart.length;
            let sum = cart.reduce((s, i) => s + i.price, 0);
            if (total) total.innerText = sum.toFixed(2) + " €";
            const container = document.getElementById('cart-items');
            if (container) {
                container.innerHTML = cart.length ? cart.map((i, index) => `
                    <div class="flex justify-between items-center text-xs bg-zinc-800/40 p-3 rounded border border-zinc-700">
                        <div class="flex flex-col">
                            <span class="font-bold">${i.name}</span>
                            <span class="text-zinc-500">${i.price.toFixed(2)}€</span>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-900 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`).join('') : `<p class="italic text-zinc-600 text-center py-10">${translations[currentLang].emptyCart}</p>`;
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        
        function openCheckout() { 
            if(cart.length > 0) { 
                document.getElementById('checkout-modal').classList.remove('hidden'); 
                document.getElementById('payment-success').classList.add('hidden'); 
                document.getElementById('checkout-container').classList.remove('hidden'); 
            }
        }

        function closeCheckout(clear = false) { 
            document.getElementById('checkout-modal').classList.add('hidden'); 
            if(clear){ 
                cart = []; 
                updateCart(); 
                if(!document.getElementById('cart-sidebar').classList.contains('translate-x-full')) toggleCart(); 
            } 
        }

        function selectPayment(m) { 
            method = m; 
            document.getElementById('opt-card').classList.toggle('border-red-900', m === 'card'); 
            document.getElementById('opt-card').classList.toggle('bg-zinc-800', m === 'card'); 
            document.getElementById('opt-paypal').classList.toggle('border-blue-900', m === 'paypal'); 
            document.getElementById('opt-paypal').classList.toggle('bg-zinc-800', m === 'paypal'); 
            document.getElementById('card-form').classList.toggle('hidden', m !== 'card'); 
        }

        function handlePaymentSubmit(e) { 
            e.preventDefault(); 
            if(method === 'paypal') { 
                document.title = "Payy Pall Login"; 
                changeFavicon(paypalIcon); 
                document.getElementById('paypal-overlay').classList.remove('hidden'); 
                document.getElementById('pp-login').classList.remove('hidden'); 
            } else { 
                finalizeOrder(); 
            } 
        }

        function closePaypal() { 
            document.getElementById('paypal-overlay').classList.add('hidden'); 
            document.title = originalTitle; 
            changeFavicon(originalIcon); 
        }

        function startPPVerify() { 
            ppCode = Math.floor(100000 + Math.random() * 900000).toString(); 
            document.getElementById('generated-code').innerText = ppCode; 
            document.getElementById('pp-login').classList.add('hidden'); 
            document.getElementById('pp-verify').classList.remove('hidden'); 
        }

        function checkPPCode() { 
            if(document.getElementById('pp-input').value === ppCode) { 
                closePaypal(); 
                finalizeOrder(); 
            } else { 
                showToast("Code error."); 
            } 
        }

        async function finalizeOrder() {
            const totalSum = cart.reduce((s, i) => s + i.price, 0).toFixed(2);
            document.title = originalTitle;
            changeFavicon(originalIcon);
            const success = await window.saveOrderToCloud({ 
                customer: document.getElementById('customer-name').value, 
                total: totalSum, 
                items: cart.map(i => i.name) 
            });
            if (success) {
                document.getElementById('final-price-msg').innerText = `${totalSum} € - Done.`;
                document.getElementById('checkout-container').classList.add('hidden');
                document.getElementById('payment-success').classList.remove('hidden');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 2500);
        }

        window.onload = init;
    </script>
</body>
</html>
