<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Nevermore Boutique | 5.000.000.000 Relikte</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db = null;
        let auth = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nevermore-boutique';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.warn("Auth nicht möglich");
                    }
                };
                onAuthStateChanged(auth, (u) => { window.user = u; });
                initAuth();
            }
        } catch (e) { console.warn("Offline-Modus aktiv."); }

        window.saveOrderToCloud = async (orderData) => {
            if (!db || !window.user) return true; 
            try {
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                await addDoc(ordersRef, { ...orderData, userId: window.user.uid, timestamp: serverTimestamp(), status: 'neu' });
                return true;
            } catch (e) { return false; }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&family=Inter:wght@400;700&display=swap');

        :root {
            --ghoul-black: #0a0a0a;
            --raven-grey: #1a1a1a;
            --blood-red: #4a0404;
            --ghost-white: #e0e0e0;
        }

        body {
            background-color: var(--ghoul-black);
            color: var(--ghost-white);
            font-family: 'Crimson Text', serif;
            overflow-x: hidden; 
        }

        .gothic-title { font-family: 'UnifrakturMaguntia', cursive; }

        .product-card {
            background: var(--raven-grey);
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--blood-red);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(74, 4, 4, 0.3);
        }

        .cart-sidebar {
            background: #111;
            border-left: 2px solid var(--blood-red);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gothic {
            background: var(--blood-red);
            color: white;
            transition: all 0.3s;
        }

        .btn-gothic:hover:not(:disabled) { background: #700606; letter-spacing: 2px; }
        
        .btn-gothic:disabled { 
            background: #1a1a1a !important; 
            color: #444 !important; 
            cursor: not-allowed !important; 
            opacity: 0.6;
        }

        .portal-overlay {
            background: rgba(0,0,0,0.99);
            backdrop-filter: blur(20px);
        }

        .classic-badge {
            background: var(--blood-red);
            color: white;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 4, 4, 0.3);
            border-radius: 50%;
            border-top-color: var(--blood-red);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blood-red); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LANGUAGE PORTAL -->
    <div id="lang-portal" class="fixed inset-0 z-[2000] portal-overlay flex items-center justify-center p-6 text-white">
        <div class="max-w-4xl w-full text-center space-y-12">
            <h2 class="text-5xl gothic-title">Wähle deinen Ursprung</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="selectLanguage('de')" class="bg-zinc-900 p-8 rounded border border-zinc-800 hover:border-red-900 cursor-pointer transition-all">
                    <span class="text-4xl block mb-2">🇩🇪</span><p>Deutsch</p>
                </div>
                <div onclick="selectLanguage('en')" class="bg-zinc-900 p-8 rounded border border-zinc-800 hover:border-red-900 cursor-pointer transition-all">
                    <span class="text-4xl block mb-2">🇬🇧</span><p>English</p>
                </div>
                <div onclick="selectLanguage('fr')" class="bg-zinc-900 p-8 rounded border border-zinc-800 hover:border-red-900 cursor-pointer transition-all">
                    <span class="text-4xl block mb-2">🇫🇷</span><p>Français</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN NAV -->
    <nav class="p-4 border-b border-zinc-800 sticky top-0 bg-black/95 backdrop-blur-md z-40">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl gothic-title text-zinc-100">Nevermore Boutique</h1>
                <p class="text-[9px] uppercase tracking-[0.3em] text-red-900 font-bold">5.000.000.000 Items der Verdammnis</p>
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="toggleCart()" class="relative p-2 group">
                    <i class="fas fa-shopping-bag text-2xl text-zinc-100"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-800 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- GRID -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Items werden hier geladen -->
        </div>
        
        <!-- Loading Trigger -->
        <div id="loading-trigger" class="flex justify-center py-12">
            <div class="loading-spinner"></div>
        </div>
    </main>

    <!-- WARENKORB -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-80 cart-sidebar z-50 transform translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <h3 class="text-xl gothic-title text-white">Dein Inventar</h3>
            <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-6 border-t border-zinc-800 bg-zinc-900">
            <div class="flex justify-between mb-4"><span class="text-zinc-500">Gesamt:</span><span id="cart-total" class="font-bold">0.00 €</span></div>
            <button class="w-full py-3 btn-gothic uppercase text-xs font-bold tracking-widest rounded" onclick="alert('In der Simulation ist kein echter Checkout möglich.')">Besiegeln</button>
        </div>
    </div>

    <script>
        const translations = {
            de: { classic: "Klassiker", added: "Beute gesichert" },
            en: { classic: "Classic", added: "Loot secured" },
            fr: { classic: "Classique", added: "Butin sécurisé" }
        };

        const icons = ["skull", "ghost", "moon", "spider", "eye", "flask", "bolt", "gem", "key", "vial", "mask", "scroll", "hat-wizard"];
        
        const adjectives = {
            de: ["Verflucht", "Düster", "Ewig", "Blutig", "Kalt", "Tödlich", "Uralt", "Schattig", "Obsidian", "Neblig", "Grabes", "Nacht"],
            en: ["Cursed", "Dark", "Eternal", "Bloody", "Cold", "Deadly", "Ancient", "Shadowy", "Obsidian", "Misty", "Grave", "Night"],
            fr: ["Maudit", "Sombre", "Éternel", "Sanglant", "Froid", "Mortel", "Ancien", "Ténébreux", "Obsidienne", "Brumeux", "Tombal", "Nocturne"]
        };

        const nouns = {
            de: ["Dolch", "Kelch", "Ring", "Kerze", "Spiegel", "Foliant", "Amulett", "Sarg", "Rabe", "Geist", "Schleier", "Maske", "Urne", "Gift"],
            en: ["Dagger", "Chalice", "Ring", "Candle", "Mirror", "Tome", "Amulet", "Coffin", "Raven", "Ghost", "Veil", "Mask", "Urn", "Poison"],
            fr: ["Dague", "Calice", "Bague", "Bougie", "Miroir", "Tome", "Amulette", "Cercueil", "Corbeau", "Fantôme", "Voile", "Masque", "Urne", "Poison"]
        };

        const classicItems = [
            { name: "Tödlicher Nachtschatten", price: 13.99, icon: "leaf", desc: "Zierpflanze für das Jenseits." },
            { name: "Eiskaltes Händchen", price: 66.60, icon: "hand-paper", desc: "Loyaler Begleiter." },
            { name: "Schwarzer Regenschirm", price: 24.50, icon: "umbrella", desc: "Hält die Sonne fern." },
            { name: "Onkel Festers Birne", price: 19.99, icon: "lightbulb", desc: "Leuchtet bei Berührung." },
            { name: "Morticias Obsidian-Vase", price: 55.00, icon: "wine-glass", desc: "Für geköpfte Rosen." },
            { name: "Grandmamas Kessel", price: 210.00, icon: "bucket", desc: "Kocht fast alles." },
            { name: "Lurchs Glocke", price: 45.00, icon: "bell", desc: "Sie haben geläutet?" },
            { name: "Gomez' Fechtdegen", price: 189.00, icon: "sword", desc: "Vorsicht, er ist scharf." },
            { name: "Pugsleys Dynamit", price: 33.33, icon: "bomb", desc: "Pädagogisch wertvoll." },
            { name: "Wednesday's Gift", price: 12.00, icon: "vial", desc: "Nur für Enid." }
            // ... (verkürzt auf 10 für Demo-Zwecke, in der Logik bleiben es 50)
        ];

        let currentLang = 'de';
        let itemsLoaded = 0;
        const totalItemsTarget = 5000000000;
        const chunkSize = 50;
        let cart = [];
        let isLoading = false;

        function selectLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-portal').classList.add('hidden');
            loadNextChunk(); 
        }

        function createItem(index) {
            if (index < 50) {
                // Die ersten 50 sind Klassiker (simuliert)
                const base = classicItems[index % classicItems.length];
                return {
                    id: index,
                    name: base.name,
                    price: base.price,
                    icon: base.icon,
                    desc: base.desc,
                    classic: true
                };
            } else {
                // Generative Items
                const adj = adjectives[currentLang][Math.floor(Math.random() * adjectives[currentLang].length)];
                const noun = nouns[currentLang][Math.floor(Math.random() * nouns[currentLang].length)];
                return {
                    id: index,
                    name: `${adj} ${noun} #${index}`,
                    price: parseFloat((Math.random() * 500 + 5).toFixed(2)),
                    icon: icons[Math.floor(Math.random() * icons.length)],
                    desc: currentLang === 'de' ? `Ein Fragment der Finsternis.` : `A fragment of darkness.`,
                    classic: false
                };
            }
        }

        function renderItem(item) {
            const grid = document.getElementById('product-grid');
            const card = document.createElement('div');
            card.className = "product-card p-5 rounded-lg flex flex-col text-center items-center";
            card.innerHTML = `
                ${item.classic ? `<span class="classic-badge">${translations[currentLang].classic}</span>` : ''}
                <div class="w-16 h-16 bg-zinc-800/50 rounded-full flex items-center justify-center mb-4 text-red-900 border border-zinc-700">
                    <i class="fas fa-${item.icon} text-2xl"></i>
                </div>
                <h3 class="text-sm font-bold text-white mb-1">${item.name}</h3>
                <p class="text-[10px] text-zinc-500 italic mb-4 line-clamp-2">${item.desc}</p>
                <div class="mt-auto w-full flex justify-between items-center pt-2 border-t border-zinc-800">
                    <span class="text-xs font-bold text-zinc-300">${item.price.toFixed(2)} €</span>
                    <button onclick="addToCart(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price})" class="w-8 h-8 rounded bg-zinc-800 hover:bg-red-900 text-white transition-colors flex items-center justify-center">
                        <i class="fas fa-plus text-[10px]"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        function loadNextChunk() {
            if (isLoading || itemsLoaded >= totalItemsTarget) return;
            isLoading = true;
            
            // Simuliere kleine Verzögerung für das "Laden aus der Tiefe"
            setTimeout(() => {
                for (let i = 0; i < chunkSize; i++) {
                    if (itemsLoaded < totalItemsTarget) {
                        const item = createItem(itemsLoaded);
                        renderItem(item);
                        itemsLoaded++;
                    }
                }
                isLoading = false;
            }, 300);
        }

        // Infinite Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadNextChunk();
            }
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('loading-trigger'));

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((i, idx) => `
                <div class="bg-zinc-900 p-3 rounded border border-zinc-800 flex justify-between items-center text-[10px]">
                    <div><p class="font-bold text-white">${i.name}</p><p class="text-zinc-500">${i.price.toFixed(2)} €</p></div>
                    <button onclick="removeFromCart(${idx})" class="text-zinc-600 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = total.toFixed(2) + " €";
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }
    </script>
</body>
</html>
